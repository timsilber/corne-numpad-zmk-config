# --- Power ---
# Deep sleep after 15 minutes of inactivity
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Battery level reporting over BLE
CONFIG_ZMK_BATTERY_REPORTING=y

# --- Bluetooth ---
# Boost TX power for better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Experimental BLE connection params (tighter intervals, lower latency)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Allow 5 BLE profiles (switchable via Fn layer)
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# --- Input ---
# Eager debouncing (fast response, reliable release)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# --- ZMK Studio ---
# Realtime keymap editing over USB
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
